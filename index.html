:root{--ink:#20241f;--ink2:#55594e;--mut:#8a8f83;--line:#e2e5da;--line2:#cfd3c6;--card:#fff;--soft:#f6f8f2}

@media(max-width:720px){.grid{grid-template-columns:1fr 1fr}body{padding:24px 18px}}

.backlink{display:inline-block;font-size:12px;color:var(--mut);text-decoration:none;margin-bottom:4px}.backlink:hover{color:#1D9E75}

 var dots=pts.map(function(p,j){if(st!==null&&j===0)return '<circle cx="'+p[0].toFixed(1)+'" cy="'+p[1].toFixed(1)+'" r="3" fill="#fff" stroke="'+ac+'" stroke-width="2"/>';return '<circle cx="'+p[0].toFixed(1)+'" cy="'+p[1].toFixed(1)+'" r="4.5" fill="'+ac+'" stroke="#fff" stroke-width="2"/>';}).join('');
 var labs=curve.map(function(c,i){var j=i+off;var xx=px(j),an=total===1?'middle':(j===0?'start':(j===total-1?'end':'middle'));return '<text x="'+xx.toFixed(1)+'" y="'+(pts[j][1]-9).toFixed(1)+'" text-anchor="'+an+'" font-size="10.5" fill="#55594e" font-family="Noto Sans KR">'+c[1]+'</text>';}).join('');
 var path=total>1?'<path d="'+line+'" fill="none" stroke="'+ac+'" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>':'';
 return '<svg viewBox="0 0 '+W+' '+H+'" width="100%" style="max-width:340px"><line x1="'+pad+'" y1="'+(H-8)+'" x2="'+(W-pad)+'" y2="'+(H-8)+'" stroke="#e2e5da"/>'+path+dots+labs+'</svg>';
}
function stepEl(i,title,val,bodyChips){
 var active=(s.step===i);
 var reached=(s.step>=i||s.done);
 if(!reached)return '';
 var cls='step'+(active?' act':'')+(!active&&reached?' done':'');
 var head='<div class="shead" onclick="_sw.editStep('+i+')"><span class="snum">'+i+'</span><span class="sttl">'+title+'</span><span class="sval">'+(val||'')+'</span>'+(!active?'<span class="sedit">변경</span>':'')+'</div>';
 var body=active?'<div class="sbody">'+bodyChips+'</div>':'';
 return '<div class="'+cls+'">'+head+body+'</div>';
}
function render(){
 var lp=L[s.lineup],ac=lp.ac,el=document.getElementById('app');el.style.setProperty('--ac',ac);
 var tabs=Object.keys(L).map(function(k){var x=L[k];return '<div class="tab '+(k===s.lineup?'on':'')+'" style="--ac:'+x.ac+'" onclick="_sw.selLineup(\''+k+'\')"><span class="tg">'+x.tier+'</span><span class="tt">'+x.label+'</span><span class="td">'+x.desc+'</span></div>';}).join('');
 var spaceChips=Object.keys(lp.spaces).map(function(sp){return '<button class="chip '+((s.picked.space&&sp===s.space)?'on':'')+'" onclick="_sw.selSpace(\''+sp.replace(/'/g,"\\'")+'\')">'+sp+'</button>';}).join('');
 var recM=lp.spaces[s.space].method;
 var methodChips=lp.methods.map(function(m){return '<button class="chip '+((s.picked.method&&m===s.method)?'on':'')+'" onclick="_sw.selMethod(\''+m+'\')"><span>'+m+'</span>'+(m===recM?'<span class="rec">추천</span>':'')+'</button>';}).join('');
 var recMode=lp.spaces[s.space].mode;
 var modeChips=Object.keys(lp.modes).map(function(md){return '<button class="chip '+((s.picked.mode&&md===s.mode)?'on':'')+'" onclick="_sw.selMode(\''+md.replace(/'/g,"\\'")+'\')"><span>'+md+'</span>'+(md===recMode?'<span class="rec">추천</span>':'')+'</button>';}).join('');
 var structChips=Object.keys(STR).map(function(k){return '<button class="chip '+(k===s.struct?'on':'')+'" onclick="_sw.selStruct(\''+k+'\')"><span><b>'+STR[k].n+'</b> <span style="color:var(--mut);font-size:11px">'+STR[k].d+'</span></span></button>';}).join('');
 var lenChips=lp.modes[s.mode].lengths.map(function(x){return '<button class="chip '+((s.picked.length&&x===s.length)?'on':'')+'" onclick="_sw.selLength(\''+x+'\')">'+x+'</button>';}).join('');
 var order=stepOrder();
 var chipMap={space:spaceChips,method:methodChips,mode:modeChips,struct:structChips,length:lenChips};
 var titleMap={space:'공간',method:'청음 방식',mode:'목적',struct:'구조',length:'길이'};
 var valMap={space:s.space,method:s.method,mode:s.mode,struct:hasVariants()?STR[s.struct].n:'',length:s.length};
 var stepsHTML=order.map(function(type,idx){var i=idx+1;var confirmed=(s.step>i||s.done);return stepEl(i,titleMap[type],confirmed?valMap[type]:'',chipMap[type]);}).join('');
 var steps='<div class="steps">'+stepsHTML+'</div>';
 var cardHTML='';
 if(s.done){
  var md=lp.modes[s.mode],cv=curOf();
  function shd(n,t,x){return '<div class="shd"><span class="sn">'+n+'</span>'+t+(x?'<span class="sx">'+x+'</span>':'')+'</div>';}
  // 조각 1 — 시간 설계 (구조탭 + 곡선 + 타임라인)
  var structTabs='';
  if(hasVariants()){
   var st=Object.keys(STR).map(function(k){return '<button class="stab '+(k===s.struct?'on':'')+'" onclick="_sw.selStruct(\''+k+'\')">'+STR[k].n+'</button>';}).join('');
   structTabs='<p class="sec">구조 · 탭으로 비교</p><div class="stabs">'+st+'</div><div class="sdesc">'+STR[s.struct].d+'</div>';
  }
  var themeTabs='';
  if(hasThemes()){
   var tms=L[s.lineup].modes[s.mode].themes,th=themeOf();
   var tt=Object.keys(tms).map(function(k){return '<button class="stab '+(k===s.theme?'on':'')+'" onclick="_sw.selTheme(\''+k.replace(/'/g,"\\'")+'\')">'+k+'</button>';}).join('');
   themeTabs='<p class="sec">테마 · 탭으로 선택</p><div class="stabs">'+tt+'</div><div class="sdesc">'+th.mood+'</div>';
   if(th.arc&&cv){themeTabs+='<div class="arc">'+th.arc.map(function(a,i){return '<div class="arow2"><b>'+(cv[i]?cv[i][0]:'')+'</b>'+a+'</div>';}).join('')+'</div>';}
  }
  var curveBlock='';
  if(cv){
   var moods=cv.map(function(c){return '<span class="mood"><b>'+c[0]+'</b><span>'+c[1]+'</span></span>';}).join('');
   var pLabel=(lp.unit==='BPM'?'BPM 곡선':'뇌파 진행');
   curveBlock='<p class="sec">'+pLabel+'</p>'+curveSVG(cv,ac,lp.unit)+'<div class="moods" style="margin-top:8px">'+moods+'</div>';
   var tl=timeline(cv,parseMin(s.length));
   if(tl)curveBlock+=timelineHTML(tl,parseMin(s.length),ac);
  }
  // 조각 2 — 사운드 기반 (청음 + 자연 ASMR 베이스)
  var soundBlock='<p class="sec">청음 방식 · '+s.method+'</p><div class="note">'+M[s.method].note+'</div>';
  if(s.method==='스피커'){var nr=asmrRec();soundBlock+='<p class="sec">자연 ASMR 베이스 (바이노럴 대체)</p><div class="nat"><b>'+nr.n+'</b><br>'+nr.r+'</div>';}
  // 조각 3 — 편곡 레이어
  var arrBlock=md.arr?arrHTML(md.arr,ac):'';
  // 조각 4 — 근거 · 검토
  var refBlock='';
  if(md.sci)refBlock+='<div class="sci">'+md.sci+'</div>';
  if(md.warn)refBlock+='<div class="warn">⚠ '+md.warn+'</div>';
  var metaBlock='<div class="meta" style="margin-top:14px"><div class="mtile"><div class="l">길이</div><div class="v">'+s.length+'</div></div><div class="mtile"><div class="l">테마 · 구성</div><div class="v" style="font-size:12px;line-height:1.4">'+md.theme+'</div></div></div>';
  var structTag=hasVariants()?'<span style="font-size:12px;color:var(--mut)">'+STR[s.struct].n+'</span>':'';
  var secs=[];
  if(cv)secs.push([structTabs+themeTabs+curveBlock,'진행 설계 · 시간축',s.length]);
  if(md.arr)secs.push([arrBlock,'사운드 구성 · 트랙 레이어','기반 위에 쌓기']);
  secs.push([soundBlock,'재생·청취 · 출력 환경',s.method]);
  if(refBlock)secs.push([refBlock,'근거 · 검토','']);
  var secsHTML=secs.map(function(x,i){return shd(String(i+1),x[1],x[2])+x[0];}).join('');
  cardHTML='<div class="card"><div class="chead"><span class="bd">'+lp.label+'</span><span style="font-weight:700">'+s.space+' · '+s.mode+'</span><span style="font-size:12px;color:var(--mut)">'+md.tag+'</span>'+structTag+'</div>'
   +'<div class="path">'+s.space+' → '+s.method+' → '+s.mode+(hasVariants()?' → '+STR[s.struct].n:'')+' → '+s.length+'</div>'
   +metaBlock
   +secsHTML
   +'<button class="gen" style="margin-top:18px" onclick="_sw.toggleSpec()">'+(showSpec?'사양 접기':'이 프리셋 사양 보기')+'</button><div class="spec '+(showSpec?'show':'')+'"><h4>프리셋 제작 사양</h4><pre id="specTxt">'+specText()+'</pre><button class="cpy" id="cpyBtn" onclick="_sw.copySpec()">사양 텍스트 복사</button><button class="cpy" onclick="_sw.exportJSON()" style="margin-left:8px">JSON 내보내기 · 빌더 앱용</button><button class="cpy" onclick="_sw.exportMIDI()" style="margin-left:8px">MIDI 내보내기 · Logic용</button></div></div>';
 }
 el.innerHTML='<div class="tabs">'+tabs+'</div>'+steps+cardHTML;
}
applySpace(Object.keys(L.therapy.spaces)[0]);render();
</script></body></html>
